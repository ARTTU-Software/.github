name: STM32 Build Template

on:
  workflow_call:

jobs:
  build:
    name: CMake Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install ARM Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 'latest'

      - name: Install Build Tools
        run: sudo apt-get install -y ninja-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          # This key ensures the cache is shared across runs of the same OS
          key: ${{ runner.os }}-stm32-ccache

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/gcc-arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DFIRMWARE_VERSION="${{ github.ref_name }}"

      - name: Compile Project
        run: cmake --build build

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stm32-artifacts
          path: |
            build/**/*.elf
            build/**/*.bin
            build/**/*.map
            build/compile_commands.json
          if-no-files-found: warn