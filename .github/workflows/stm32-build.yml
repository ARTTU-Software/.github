name: STM32 Build Template

on:
  workflow_call:
    inputs:
      run_reviewdog:
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: CMake Compile
    runs-on: ubuntu-latest
    # Using a verified, existing image for firmware development
    container:
      image: docker.io/akospasztor/docker-gcc-arm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install Cppcheck
        # CMake and Ninja are already in this image! 
        # We just need the linter.
        run: |
          apt-get update -qq
          apt-get install -y cppcheck

      - name: Configure CMake
        run: |
          # The toolchain path is usually /usr/bin or /opt/gcc... 
          # This image handles the PATH automatically.
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Compile Project
        run: cmake --build build

      - name: Setup Reviewdog
        if: ${{ inputs.run_reviewdog }}
        uses: reviewdog/action-setup@v1

      - name: Run Cppcheck via Reviewdog
        if: ${{ inputs.run_reviewdog }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORTER=$([[ "${{ github.event_name }}" == "pull_request" ]] && echo "github-pr-review" || echo "github-check")
          
          JSON_PATH=$(find build -name compile_commands.json)
          IGNORE_ARGS=$(find Drivers -maxdepth 1 -type d \( -name "*_HAL_Driver" -o -name "CMSIS" \) -printf "-i %p ")
          
          # Parallelized scan with a depth limit to prevent hangs
          cppcheck --project="$JSON_PATH" $IGNORE_ARGS \
            --enable=warning,performance,portability --inline-suppr \
            --max-ctu-depth=2 -j 2 2>&1 | \
          reviewdog -efm="%f:%l:%c: %m" -efm="%f:%l: %m" -name="cppcheck" -reporter=$REPORTER -level=warning