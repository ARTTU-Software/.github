name: STM32 Build Template

on:
  workflow_call:
    inputs:
      run_reviewdog:
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: CMake Compile
    runs-on: ubuntu-latest
    container:
      # DO NOT add ghcr.io/ here. This pulls straight from Docker Hub.
      image: jafee201153/arm-none-eabi-gcc:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install Cppcheck
        # This image already has gcc-arm-none-eabi, cmake, and ninja.
        # We just need the linter.
        run: |
          apt-get update -qq
          apt-get install -y cppcheck

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Compile Project
        run: cmake --build build

      - name: Setup Reviewdog
        if: ${{ inputs.run_reviewdog }}
        uses: reviewdog/action-setup@v1

      - name: Run Cppcheck via Reviewdog
        if: ${{ inputs.run_reviewdog }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Detect if we are in a PR or a push
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            REPORTER="github-pr-review"
          else
            REPORTER="github-check"
          fi

          JSON_PATH=$(find build -name compile_commands.json)
          
          # Dynamic exclusion of ST libraries to prevent hangs
          IGNORE_ARGS=$(find Drivers -maxdepth 1 -type d \( -name "*_HAL_Driver" -o -name "CMSIS" \) -printf "-i %p ")

          cppcheck --project="$JSON_PATH" $IGNORE_ARGS \
            --enable=warning,performance,portability --inline-suppr \
            --max-ctu-depth=2 -j 2 2>&1 | \
          reviewdog -efm="%f:%l:%c: %m" -efm="%f:%l: %m" -name="cppcheck" -reporter=$REPORTER -level=warning