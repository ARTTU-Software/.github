name: STM32 Build Template

on:
  workflow_call:
    inputs:
      run_reviewdog:
        description: 'Run Reviewdog linters (cppcheck/gcc)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: CMake Compile
    runs-on: ubuntu-latest
    container:
      # This is a very stable image used for STM32 CI
      image: ghcr.io/stefanct/stm32-build:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install Build Tools & Linters
        # Since the Docker image is slim, we grab Ninja and Cppcheck.
        # This is much faster because we don't have to install the 500MB compiler.
        run: |
          apt-get update
          apt-get install -y ninja-build cppcheck

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/gcc-arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Compile Project
        run: cmake --build build

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stm32-firmware
          path: |
            build/**/*.elf
            build/**/*.bin
            build/**/*.map
          if-no-files-found: warn

      # --- REVIEWDOG STEPS ---

      - name: Setup Reviewdog
        if: ${{ inputs.run_reviewdog }}
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run Cppcheck via Reviewdog
        if: ${{ inputs.run_reviewdog }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            REPORTER="github-pr-review"
          else
            REPORTER="github-check"
          fi

          JSON_PATH=$(find build -name compile_commands.json)

          # Find HAL and CMSIS driver folders to ignore them (Universal wildcards)
          IGNORE_ARGS=$(find Drivers -maxdepth 1 -type d \( -name "*_HAL_Driver" -o -name "CMSIS" \) -printf "-i %p ")
          
          echo "Ignoring vendor libraries: $IGNORE_ARGS"

          cppcheck --project="$JSON_PATH" \
            $IGNORE_ARGS \
            --enable=warning,performance,portability \
            --inline-suppr \
            --max-ctu-depth=2 \
            -j 2 2>&1 | \
          reviewdog -efm="%f:%l:%c: %m" -efm="%f:%l: %m" -name="cppcheck" -reporter=$REPORTER -level=warning