name: STM32 Build Template

on:
  workflow_call:
    inputs:
      run_reviewdog:
        description: 'Run Reviewdog linters (cppcheck/gcc)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: CMake Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install ARM Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 'latest'

      - name: Install Build Tools & Linters
        run: sudo apt-get update && sudo apt-get install -y ninja-build cppcheck

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/gcc-arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Compile Project
        run: cmake --build build

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stm32-firmware
          path: |
            build/**/*.elf
            build/**/*.bin
            build/**/*.map
          if-no-files-found: warn

      # --- REVIEWDOG STEPS ---

      - name: Setup Reviewdog
        if: ${{ inputs.run_reviewdog }}
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run Cppcheck via Reviewdog
        if: ${{ inputs.run_reviewdog }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Determine the correct reporter based on the event type
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            REPORTER="github-pr-review"
          else
            REPORTER="github-check"
          fi

          # 2. Run cppcheck and pipe it to reviewdog using that dynamic variable
          # Removed --quiet so we can see the file scan progress in the logs
          cppcheck --project=build/compile_commands.json --enable=warning,performance,portability --inconclusive 2>&1 | \
          reviewdog -efm="%f:%l:%c: %m" -efm="%f:%l: %m" -name="cppcheck" -reporter=$REPORTER -level=warning