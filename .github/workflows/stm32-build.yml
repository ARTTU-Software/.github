name: STM32 Build Template

on:
  workflow_call:
    inputs:
      run_reviewdog:
        description: 'Run Reviewdog linters (cppcheck/gcc)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: CMake Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install ARM Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 'latest'

      - name: Install Build Tools & Linters
        run: sudo apt-get update && sudo apt-get install -y ninja-build cppcheck

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/gcc-arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Compile Project
        run: cmake --build build

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stm32-firmware
          path: |
            build/**/*.elf
            build/**/*.bin
            build/**/*.map
          if-no-files-found: warn

      # --- REVIEWDOG STEPS ---

      - name: Setup Reviewdog
        if: ${{ inputs.run_reviewdog }}
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run Cppcheck via Reviewdog
        if: ${{ inputs.run_reviewdog }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            REPORTER="github-pr-review"
          else
            REPORTER="github-check"
          fi

          echo "--- Locating compile_commands.json ---"
          # This finds the file and stores the path in a variable
          JSON_PATH=$(find build -name compile_commands.json)
          
          if [ -z "$JSON_PATH" ]; then
            echo "ERROR: compile_commands.json not found anywhere in build/!"
            echo "--- Contents of build directory for reference ---"
            ls -R build
            exit 1
          fi

          echo "Found file at: $JSON_PATH"
          echo "--- File Content (First 10 lines) ---"
          head -n 10 "$JSON_PATH"

          cppcheck --project="$JSON_PATH" \
            --enable=warning,performance,portability \
            --inconclusive --force 2>&1 | \
          reviewdog -efm="%f:%l:%c: %m" -efm="%f:%l: %m" -name="cppcheck" -reporter=$REPORTER -level=warning