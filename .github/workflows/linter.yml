name: STM32 Clang-Tidy Linter

on:
  workflow_call:
    inputs:
      artifact_name:
        description: 'Name of the artifact containing compile_commands.json'
        required: false
        type: string
        default: 'stm32-artifacts'

jobs:
  lint:
    name: Clang-Tidy Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 'latest'

      - name: Get ARM Toolchain Paths
        id: arm_paths
        run: |
          ARM_BASE=$(dirname $(dirname $(which arm-none-eabi-gcc)))
          ARM_VERSION=$(arm-none-eabi-gcc -dumpversion)
          echo "ARM_INCLUDE=${ARM_BASE}/arm-none-eabi/include" >> $GITHUB_OUTPUT
          echo "ARM_GCC_INCLUDE=${ARM_BASE}/lib/gcc/arm-none-eabi/${ARM_VERSION}/include" >> $GITHUB_OUTPUT
          echo "ARM_GCC_INCLUDE_FIXED=${ARM_BASE}/lib/gcc/arm-none-eabi/${ARM_VERSION}/include-fixed" >> $GITHUB_OUTPUT

      - name: Download Build Database
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: build

      - name: Run Clang-Tidy Static Analysis
        uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          database: 'build'
          style: 'file'
          
          tidy-checks: '-*,bugprone-*,clang-analyzer-*,performance-*,misc-*,cert-*,-misc-include-cleaner'
          
          tidy-review: true
          format-review: true
          thread-comments: ${{ github.event_name == 'pull_request' && 'update' }}
          
          extra-args: >
            -target arm-none-eabi
            --extra-arg=-isystem${{ steps.arm_paths.outputs.ARM_INCLUDE }}
            --extra-arg=-isystem${{ steps.arm_paths.outputs.ARM_GCC_INCLUDE }}
            --extra-arg=-isystem${{ steps.arm_paths.outputs.ARM_GCC_INCLUDE_FIXED }}